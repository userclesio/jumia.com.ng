    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #111; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: #fff; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; height: 56px; position: sticky; top: 0; z-index: 100; }
        .wrap { max-width: 400px; margin: auto; padding: 40px 16px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card { background: #fff; border-radius: 16px; padding: 32px 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); text-align: center; }
        .card h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #111; }
        .card p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
        .form-group input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 14px; font-size: 15px; font-family: 'Inter', sans-serif; color: #111; background: #fafafa; outline: none; transition: all 0.2s; font-weight: 500; letter-spacing: 1px;}

        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(246, 139, 30, 0.3); opacity: 0.95; }
        .submit-btn:active { transform: scale(0.98); }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; margin-top: auto; }
        .icon-wrap { background: #fff8f0; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #f68b1e; border: 2px solid #ffe9d6; }

<body>
    <header class="topbar">
        <span style="font-weight: 900; color: #f68b1e; font-size: 20px;">JUMIA</span>
    </header>

    <div class="wrap">
        <div class="card">
            <div class="icon-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            </div>
            <h2>Track Your Package</h2>
            <p>Enter the tracking code provided after your checkout to see real-time updates on your Microwave Bundle order.</p>
            
            <form id="trackForm">
                <div class="form-group">
                    <label for="trackCode">Tracking Code</label>
                    <input type="text" id="trackCode" placeholder="e.g. JUM-123456" required autocomplete="off" />
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Search Package</button>
            </form>
        </div>
    </div>
    <div class="footer">© 2026 Jumia Nigeria · All rights reserved</div>

    <script>
        document.getElementById('trackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const code = document.getElementById('trackCode').value.trim();
            if (code) {
                const btn = document.getElementById('submitBtn');
                btn.textContent = 'Locating...';
                btn.style.opacity = '0.8';
                
                // Save the code to display on the next page
                localStorage.setItem('jumia_micro_track_code', code);
                
                // Redirect after short delay for effect
                setTimeout(() => {
                    window.location.href = 'track-micro.html';
                }, 800);
            }
        });
    </script>
